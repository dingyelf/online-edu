server:
  port: 8080
  # Tomcat 关键：接收缓冲区扩容，防止大文件中途断开
  tomcat:
    max-swallow-size: 200MB
    connection-timeout: 300000
  servlet:
    session:
      timeout: 30m

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      resolve-lazily: true
      file-size-threshold: 20MB
  datasource:
    username: root
    password: Root@123456
    url: jdbc:mysql://localhost:3306/online_edu?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      database: 0
      password:
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

