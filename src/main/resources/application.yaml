server:
  port: 8080
  servlet:
    session:
      timeout: 30m

spring:
  datasource:
    username: root
    password: Root@123456
    url: jdbc:mysql://localhost:3306/online_edu?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

