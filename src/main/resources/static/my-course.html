<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课程</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">在线教育平台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/my-order.html">我的订单</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/my-course.html">我的课程</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" id="userNav"></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="mb-4">我已购买的课程</h3>
    <div class="row g-4" id="courseList">
        <div class="col-12 text-center">加载中...</div>
    </div>
</div>

<script>
    function loadMyCourse() {
        // 思路：先查全部订单（已支付）→拿到courseId，再查询课程信息
        ajaxRequest('/api/order/myList', 'GET').done(res => {
            if (res.code !== 200) return;
            const allOrders = res.data.filter(o => o.status === 1);
            if (allOrders.length === 0) {
                $('#courseList').html('<div class="col-12 text-muted text-center">暂无已购课程</div>');
                return;
            }
            // 获取所有课程ID数组
            ajaxRequest('/api/course/list', 'GET').done(courseRes => {
                const allCourse = courseRes.data;
                let html = '';
                allOrders.forEach(order => {
                    const course = allCourse.find(c => c.id === order.courseId);
                    if (!course) return;
                    const cover = course.cover || 'https://placehold.co/400x225?text=课程';
                    html += `
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm">
                            <img src="${cover}" class="card-img-top" style="height:220px;object-fit:cover;">
                            <div class="card-body">
                                <h5>${course.title}</h5>
                                <a href="/course-detail.html?id=${course.id}" class="btn btn-primary w-100">开始学习</a>
                            </div>
                        </div>
                    </div>`;
                });
                $('#courseList').html(html);
            })
        });
    }

    $(function () {
        renderNav();
        loadMyCourse();
    });
</script>
</body>
</html>
