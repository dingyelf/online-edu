<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程详情 - 在线教育平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<!-- 顶部导航 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">在线教育平台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" id="userNav"></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-0">
                    <!-- 视频播放器区域 -->
                    <div id="videoBox">
                        <video id="courseVideo" class="w-100" controls style="background: #000;">
                            浏览器不支持视频播放
                        </video>
                    </div>
                    <!-- 未购买付费课程提示区域 -->
                    <div id="buyTipBox" class="p-5 text-center d-none">
                        <h4 class="text-danger">🔒 该课程为付费课程，请购买后观看</h4>
                        <p class="fs-4 mt-2">课程价格：<span id="coursePrice"></span> 元</p>
                        <button class="btn btn-lg btn-primary mt-3" id="buyBtn">立即购买</button>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <h3 id="courseTitle">加载中...</h3>
                <hr>
                <h5>课程简介</h5>
                <p id="courseDesc" class="text-muted">暂无简介</p>
            </div>
        </div>
    </div>
</div>

<!-- 下单弹窗 -->
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">订单信息</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>订单号：<span id="modalOrderNo"></span></p>
                <p>应付金额：<span id="modalAmount"></span> 元</p>
                <p class="text-warning">测试环境：点击模拟支付即可解锁课程</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button class="btn btn-danger" id="cancelOrderBtn">取消订单</button>
                <button class="btn btn-success" id="mockPayBtn">模拟支付</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentCourseId = null;
    let currentOrderId = null;
    let orderModal = new bootstrap.Modal('#orderModal');

    function loadCourseDetail() {
        currentCourseId = getQueryParam('id');
        if (!currentCourseId) {
            alert('参数错误');
            location.href = '/index.html';
            return;
        }
        ajaxRequest(`/api/course/detail?id=${currentCourseId}`, 'GET').done(res => {
            if (res.code !== 200) {
                alert(res.msg);
                location.href = '/index.html';
                return;
            }
            const course = res.data;
            $('#courseTitle').text(course.title);
            $('#courseDesc').text(course.description || '暂无简介');
            $('#coursePrice').text(course.price);

            // 核心分支判断
            if (course.videoUrl && course.videoUrl !== '') {
                // 可正常播放
                $('#videoBox').removeClass('d-none');
                $('#buyTipBox').addClass('d-none');
                $('#courseVideo').attr('src', course.videoUrl);
            } else {
                // 未购买付费课程
                $('#videoBox').addClass('d-none');
                $('#buyTipBox').removeClass('d-none');
            }
        });
    }

    // 立即购买，创建订单
    $('#buyBtn').click(function () {
        ajaxRequest(`/api/order/create?courseId=${currentCourseId}`, 'POST').done(res => {
            if (res.code !== 200) {
                alert(res.msg);
                return;
            }
            const order = res.data;
            currentOrderId = order.id;
            $('#modalOrderNo').text(order.orderNo);
            $('#modalAmount').text(order.amount);
            orderModal.show();
        });
    });

    // 模拟支付
    $('#mockPayBtn').click(function () {
        ajaxRequest(`/api/order/mockPay?orderId=${currentOrderId}`, 'POST').done(res => {
            if (res.code === 200) {
                alert('支付成功！刷新页面即可观看视频');
                orderModal.hide();
                location.reload();
            } else {
                alert(res.msg);
            }
        });
    });

    // 取消订单
    $('#cancelOrderBtn').click(function () {
        if (!confirm('确定取消订单？')) return;
        ajaxRequest(`/api/order/cancel?id=${currentOrderId}`, 'POST').done(res => {
            if (res.code === 200) {
                alert('订单已取消');
                orderModal.hide();
            } else {
                alert(res.msg);
            }
        });
    });

    $(function () {
        renderNav();
        loadCourseDetail();
    });
</script>
</body>
</html>
