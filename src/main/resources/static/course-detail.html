<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程详情 - 在线教育平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<!-- 顶部导航 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">在线教育平台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" id="userNav"></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 课程详情内容 -->
<div class="container mt-5 mb-5">
    <div class="row">
        <!-- 视频播放区域 -->
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-0">
                    <video id="courseVideo" class="w-100" controls style="background: #000;">
                        您的浏览器不支持视频播放
                    </video>
                </div>
            </div>
            <div class="mt-4">
                <h3 id="courseTitle">加载中...</h3>
                <hr>
                <h5>课程简介</h5>
                <p id="courseDesc" class="text-muted">暂无简介</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 加载课程详情
    function loadCourseDetail() {
        const courseId = getQueryParam('id');
        if (!courseId) {
            alert('课程ID不存在');
            window.location.href = '/index.html';
            return;
        }

        ajaxRequest('/api/course/detail?id=' + courseId, 'GET').done(function (res) {
            if (res.code !== 200) {
                alert(res.msg);
                window.location.href = '/index.html';
                return;
            }
            const course = res.data;
            $('#courseTitle').text(course.title);
            $('#courseDesc').text(course.description || '暂无课程简介');
            $('#courseVideo').attr('src', course.videoUrl);
        });
    }

    // 页面初始化
    $(function () {
        renderNav();
        loadCourseDetail();
    });
</script>
</body>
</html>
