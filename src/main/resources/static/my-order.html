<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">在线教育平台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/my-order.html">我的订单</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/my-course.html">我的课程</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" id="userNav"></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="mb-4">我的订单列表</h3>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>订单号</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="orderTable">
                <tr><td colspan="5" class="text-center">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 状态文字转换
    function getStatusText(status) {
        switch (status) {
            case 0: return '<span class="text-warning">待支付</span>';
            case 1: return '<span class="text-success">已支付</span>';
            case 2: return '<span class="text-secondary">已取消</span>';
            default: return '未知';
        }
    }

    function loadOrderList() {
        ajaxRequest('/api/order/myList', 'GET').done(res => {
            if (res.code !== 200) return;
            const list = res.data;
            let html = '';
            if (list.length === 0) {
                html = '<tr><td colspan="5" class="text-center text-muted">暂无订单</td></tr>';
            } else {
                list.forEach(item => {
                    let btnHtml = '';
                    // 仅待支付可以取消
                    if (item.status === 0) {
                        btnHtml = `<button class="btn btn-sm btn-danger cancel-btn" data-id="${item.id}">取消订单</button>`;
                    }
                    html += `
                    <tr>
                        <td>${item.orderNo}</td>
                        <td>${item.amount}</td>
                        <td>${getStatusText(item.status)}</td>
                        <td>${item.createTime}</td>
                        <td>${btnHtml}</td>
                    </tr>`;
                });
            }
            $('#orderTable').html(html);

            // 取消订单事件
            $('.cancel-btn').click(function () {
                const id = $(this).data('id');
                if (!confirm('确认取消？')) return;
                ajaxRequest(`/api/order/cancel?id=${id}`, 'POST').done(r => {
                    if(r.code===200){
                        alert('已取消');
                        loadOrderList();
                    }
                });
            });
        });
    }

    $(function () {
        renderNav();
        loadOrderList();
    });
</script>
</body>
</html>
