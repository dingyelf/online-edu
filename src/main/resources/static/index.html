<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线教育平台 - 课程中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<!-- 顶部导航 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">在线教育平台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" id="userNav"></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 课程列表区域 -->
<div class="container mt-5 mb-5">
    <h2 class="mb-4">全部精品课程</h2>
    <div class="row g-4" id="courseList">
        <div class="col-12 text-center">加载中...</div>
    </div>
</div>

<script>
    let pageNum = 1;
    const pageSize = 8;
    // 加载课程列表
    function loadCourses() {
        ajaxRequest(`/api/course/list?current=${pageNum}&size=${pageSize}`, 'GET').done(function (res) {
            if (res.code !== 200) return;
            const page = res.data;
            const courseList = page.records;
            let html = '';

            if (courseList.length === 0) {
                html = '<div class="col-12 text-center text-muted">暂无课程，请联系管理员添加</div>';
            } else {
                courseList.forEach(course => {
                    const cover = course.cover || 'https://placehold.co/400x225?text=Course';
                    html += `
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm">
                            <img src="${cover}" class="card-img-top" alt="${course.title}" style="height: 225px; object-fit: cover;">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${course.title}</h5>
                                <p class="card-text text-muted flex-grow-1" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                    ${course.description || '暂无课程简介'}
                                </p>
                                <a href="/course-detail.html?id=${course.id}" class="btn btn-primary w-100 mt-2">立即学习</a>
                            </div>
                        </div>
                    </div>`;
                });
            }
            $('#courseList').html(html);
        });
    }

    // 页面初始化
    $(function () {
        renderNav();
        loadCourses();
    });
</script>
</body>
</html>
