<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/index.html">后台管理</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/course.html">课程管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/order.html">订单管理</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="javascript:logout()">退出登录</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>课程列表</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#courseModal">新增课程</button>
    </div>
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>课程名称</th>
                    <th>价格</th>
                    <th>封面</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="courseTable">
                <tr>
                    <td colspan="5" class="text-center">加载中...</td>
                </tr>
                </tbody>
            </table>
            <!--分页栏-->
            <div class="d-flex justify-content-center mt-3" id="pageBar"></div>
        </div>
    </div>
</div>

<!-- 新增/编辑弹窗 -->
<div class="modal fade" id="courseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">课程编辑</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="courseId">
                <div class="mb-3">
                    <label>课程名称</label>
                    <input class="form-control" id="title">
                </div>
                <div class="mb-3">
                    <label>课程简介</label>
                    <textarea class="form-control" id="description"></textarea>
                </div>
                <div class="mb-3">
                    <label>课程价格</label>
                    <input type="number" step="0.01" class="form-control" id="price">
                </div>
                <div class="mb-3">
                    <label>封面地址</label>
                    <input class="form-control" id="cover">
                </div>
                <div class="mb-3">
                    <label>视频地址</label>
                    <input class="form-control" id="videoUrl">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
    let courseCurrent = 1;
    const pageSize = 8;

    function loadCourseList() {
        ajaxRequest(`/api/admin/course/list?current=${courseCurrent}&size=${pageSize}`,"GET").done(res=>{
            if(res.code!==200) return;
            const page = res.data;
            const list = page.records;
            let html = "";
            if(list.length===0){
                html = "<tr><td colspan='5' class='text-center'>暂无数据</td></tr>";
            }else{
                list.forEach(item=>{
                    html += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.title}</td>
                        <td>${item.price}</td>
                        <td>
                            ${item.cover?`<img src="${item.cover}" style="height:60px">`:'无'}
                        </td>
                        <td>
                            <button class="btn btn-sm btn-info edit-btn" data-id="${item.id}">编辑</button>
                            <button class="btn btn-sm btn-danger del-btn" data-id="${item.id}">删除</button>
                        </td>
                    </tr>
                    `;
                })
            }
            $("#courseTable").html(html);
            renderPage(page);
        })
    }

    // 分页渲染
    function renderPage(page) {
        let total = page.total;
        let current = page.current;
        let size = page.size;
        let totalPage = Math.ceil(total/size);
        let pageHtml = `<ul class="pagination">`;
        if(current>1){
            pageHtml += `<li class="page-item"><a class="page-link" onclick="changeCoursePage(${current-1})">上一页</a></li>`;
        }else{
            pageHtml += `<li class="page-item disabled"><span class="page-link">上一页</span></li>`;
        }
        pageHtml += `<li class="page-item disabled"><span class="page-link">第${current}页 / 共${totalPage}页</span></li>`;
        if(current < totalPage){
            pageHtml += `<li class="page-item"><a class="page-link" onclick="changeCoursePage(${current+1})">下一页</a></li>`;
        }else{
            pageHtml += `<li class="page-item disabled"><span class="page-link">下一页</span></li>`;
        }
        pageHtml += `</ul>`;
        $("#pageBar").html(pageHtml);
    }
    function changeCoursePage(num){
        courseCurrent = num;
        loadCourseList();
    }

    // 保存
    $("#saveBtn").click(function(){
        let id = $("#courseId").val();
        let data = {
            id:id?title:null,
            title:$("#title").val(),
            description:$("#description").val(),
            price:$("#price").val(),
            cover:$("#cover").val(),
            videoUrl:$("#videoUrl").val()
        };
        ajaxRequest("/api/admin/course/save","POST",data).done(res=>{
            alert(res.msg);
            if(res.code===200){
                $("#courseModal").modal('hide');
                loadCourseList();
            }
        })
    })

    //编辑
    $(document).on("click",".edit-btn",function(){
        let id = $(this).data("id");
        ajaxRequest(`/api/course/detail?id=${id}`,"GET").done(res=>{
            let d = res.data;
            $("#courseId").val(d.id);
            $("#title").val(d.title);
            $("#description").val(d.description);
            $("#price").val(d.price);
            $("#cover").val(d.cover);
            $("#videoUrl").val(d.videoUrl);
            $("#courseModal").modal("show");
        })
    })

    //删除
    $(document).on("click",".del-btn",function(){
        let id = $(this).data("id");
        if(!confirm("确定删除？")) return;
        ajaxRequest(`/api/admin/course/delete?id=${id}`,"POST").done(res=>{
            alert(res.msg);
            loadCourseList();
        })
    })

    $(function(){
        loadCourseList();
    })
</script>
</body>
</html>
