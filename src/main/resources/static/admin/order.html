<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/index.html">后台管理</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/course.html">课程管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/order.html">订单管理</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="javascript:logout()">退出登录</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-3">全部订单</h4>
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>订单号</th>
                    <th>用户ID</th>
                    <th>课程名称</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>创建时间</th>
                </tr>
                </thead>
                <tbody id="orderTable">
                <tr>
                    <td colspan="6" class="text-center">加载中...</td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex justify-content-center mt-3" id="pageBar"></div>
        </div>
    </div>
</div>

<script>
    let orderCurrent = 1;
    const pageSize = 10;

    function getStatusText(status){
        switch(status){
            case 0:return '<span class="text-warning">待支付</span>';
            case 1:return '<span class="text-success">已支付</span>';
            case 2:return '<span class="text-secondary">已取消</span>';
            default:return "未知";
        }
    }

    function loadOrderList(){
        ajaxRequest(`/api/admin/order/list?current=${orderCurrent}&size=${pageSize}`,"GET").done(res=>{
            if(res.code!==200) return;
            const page = res.data;
            const list = page.records;
            let html = "";
            if(list.length===0){
                html = "<tr><td colspan='6' class='text-center'>暂无订单数据</td></tr>";
            }else{
                list.forEach(item=>{
                    html += `
                    <tr>
                        <td>${item.orderNo}</td>
                        <td>${item.userId}</td>
                        <td>${item.courseTitle}</td>
                        <td>${item.amount}</td>
                        <td>${getStatusText(item.status)}</td>
                        <td>${item.createTime}</td>
                    </tr>
                    `;
                })
            }
            $("#orderTable").html(html);
            renderPage(page);
        })
    }

    function renderPage(page) {
        let total = page.total;
        let current = page.current;
        let size = page.size;
        let totalPage = Math.ceil(total/size);
        let pageHtml = `<ul class="pagination">`;
        if(current>1){
            pageHtml += `<li class="page-item"><a class="page-link" onclick="changeAdminOrderPage(${current-1})">上一页</a></li>`;
        }else{
            pageHtml += `<li class="page-item disabled"><span class="page-link">上一页</span></li>`;
        }
        pageHtml += `<li class="page-item disabled"><span class="page-link">第${current}页 / 共${totalPage}页</span></li>`;
        if(current < totalPage){
            pageHtml += `<li class="page-item"><a class="page-link" onclick="changeAdminOrderPage(${current+1})">下一页</a></li>`;
        }else{
            pageHtml += `<li class="page-item disabled"><span class="page-link">下一页</span></li>`;
        }
        pageHtml += `</ul>`;
        $("#pageBar").html(pageHtml);
    }
    function changeAdminOrderPage(num){
        orderCurrent = num;
        loadOrderList();
    }

    $(function(){
        loadOrderList();
    })
</script>
</body>
</html>
