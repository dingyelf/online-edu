<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/admin/course.html">后台管理</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/course.html">课程管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/order.html">订单管理</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" id="userNav"></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-3">全部订单数据</h3>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead>
                <tr>
                    <th>订单ID</th>
                    <th>订单号</th>
                    <th>用户ID</th>
                    <th>课程ID</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>创建时间</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                <tr>
                    <td colspan="7" class="text-center">加载中</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function statusText(s) {
        if (s === 0) return '<span class="text-warning">待支付</span>';
        if (s === 1) return '<span class="text-success">已支付</span>';
        return '<span class="text-secondary">已取消</span>';
    }

    function loadOrder() {
        ajaxRequest('/api/admin/order/list', 'GET').done(res => {
            if (res.code !== 200) return;
            const list = res.data;
            let html = '';
            if (list.length === 0) {
                html = '<tr><td colspan="7" class="text-center">暂无订单</td></tr>';
            } else {
                list.forEach(item => {
                    html += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.orderNo}</td>
                        <td>${item.userId}</td>
                        <td>${item.courseId}</td>
                        <td>${item.amount}</td>
                        <td>${statusText(item.status)}</td>
                        <td>${item.createTime}</td>
                    </tr>`;
                })
            }
            $('#tableBody').html(html);
        })
    }

    $(function () {
        renderNav();
        loadOrder();
    })
</script>
</body>
</html>
